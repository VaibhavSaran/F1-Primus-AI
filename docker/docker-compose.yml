version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../.fastf1_cache:/app/.fastf1_cache
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5001
               --workers 1"
    ports:
      - "5001:5001"
    volumes:
      - ../mlruns:/mlflow/mlruns
      - ../mlflow-artifacts:/mlflow/mlflow-artifacts
    restart: unless-stopped
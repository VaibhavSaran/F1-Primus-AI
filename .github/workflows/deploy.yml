name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       us-central1
  SERVICE_NAME: f1-primus-ai
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/f1-primus-ai/f1-primus-ai

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.app \
            -t $IMAGE:$GITHUB_SHA \
            -t $IMAGE:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:latest \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8501 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --min-instances 1 \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set-env-vars "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "MLFLOW_TRACKING_URI=http://localhost:5001"

      - name: Show service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format "value(status.url)"